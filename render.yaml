services:
  - type: web
    name: command-center-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: bash start.sh
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
